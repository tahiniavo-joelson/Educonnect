<main>

      <h1>Catalogue des cours</h1>
      <p>Parcourez les cours disponibles, filtrez par matière et accédez à leurs supports.</p>
    </div>
  </section>

  <section class="container">
    <div class="toolbar">
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="search" id="course-search" placeholder="Rechercher un cours, un enseignant...">
      </div>
      <select id="subject-filter" class="filter-select" aria-label="Filtrer par matière"></select>
    </div>
    <p id="courses-count" class="courses-count"></p>
    <div id="courses-grid" class="courses-grid"></div>
    <div id="pagination" class="pagination"></div>
  </section>
</main>
