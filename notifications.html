<main class="container" style="padding:130px 0 var(--space-5);max-width:760px;">

      <p style="color:var(--color-text-muted);">Retrouvez toutes vos annonces académiques.</p>

<div id="toast-container"></div>

<script src="js/storage.js"></script>
<script src="js/validation.js"></script>
<script src="js/notifications.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    Auth.requireAuth();
    const user = Auth.currentUser();
    const listEl = document.getElementById('notifications-list');

    const ICONS = { devoir: 'fa-file-pen', note: 'fa-chart-line', rappel: 'fa-clock' };

    function render() {
      const notifications = DB.getAll(DB.KEYS.NOTIFICATIONS)
        .filter(n => n.destinataireId === user.id)
        .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

      if (!notifications.length) {
        listEl.innerHTML = `
          <div class="empty-state">
            <i class="fa-solid fa-bell-slash"></i>
            <h3>Aucune notification</h3>
            <p>Vous êtes à jour !</p>
          </div>`;
        return;
      }

      listEl.innerHTML = notifications.map(n => `
        <div class="dash-panel" style="display:flex;gap:1rem;align-items:flex-start;${n.lue ? 'opacity:.65;' : ''}">
          <div class="list-row-icon" style="flex-shrink:0;"><i class="fa-solid ${ICONS[n.type] || 'fa-bell'}"></i></div>
          <div style="flex:1;">
            <div style="display:flex;justify-content:space-between;gap:1rem;">
              <strong>${n.titre}</strong>
              ${!n.lue ? '<span class="badge badge-primary">Nouveau</span>' : ''}
            </div>
            <p style="color:var(--color-text-muted);font-size:.9rem;margin-top:.3rem;">${n.message}</p>
          </div>
        </div>
      `).join('');
    }

    document.getElementById('mark-all-read').addEventListener('click', () => {
      Notify.markAllRead(user.id);
      Notify.refreshBell(user.id);
      render();
      Notify.toast('Notifications lues', '', 'success');
    });

    render();
    Notify.refreshBell(user.id);
  });
</script>
</body>
</html>
